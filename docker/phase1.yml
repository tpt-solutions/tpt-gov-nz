      POSTGRES_PASSWORD: police_dev_password
    ports:
      - "5408:5432"
    volumes:
      - police-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U police"]
      interval: 5s
