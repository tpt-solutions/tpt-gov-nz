  gov-gateway:
    build:
      context: ..
      dockerfile: services/gov-gateway/Dockerfile
    environment:
      TPT__GOV__GATEWAY_LISTEN: "0.0.0.0:8080"
      TPT__GOV__DEPT_IRD_URL: "http://gov-dept-ird:8090"
      TPT__GOV__DEPT_WINZ_URL: "http://gov-dept-winz:8091"
      TPT__GOV__DEPT_MOH_URL: "http://gov-dept-moh:8092"
      TPT__GOV__DEPT_DIA_URL: "http://gov-dept-dia:8093"
      TPT__GOV__DEPT_NZTA_URL: "http://gov-dept-nzta:8094"
