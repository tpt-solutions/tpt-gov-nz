  dept-moj:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: moj
      POSTGRES_USER: moj
      POSTGRES_PASSWORD: moj_dev_password
    ports:
      - "5407:5432"
    volumes:
      - moj-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moj"]
      interval: 5s
      timeout: 5s
      retries: 10

  dept-police:
