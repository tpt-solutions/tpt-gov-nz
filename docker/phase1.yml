    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hud"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Identity database ---

  identity-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gov_identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity_dev_password
