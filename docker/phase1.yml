name: tpt-gov-nz-phase1

services:
  # --- Department mock nodes ---

  dept-ird:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ird
      POSTGRES_USER: ird
      POSTGRES_PASSWORD: ird_dev_password
    ports:
      - "5401:5432"
    volumes:
      - ird-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ird"]
      interval: 5s
      timeout: 5s
      retries: 10

  gov-dept-ird:
    build:
      context: ..
      dockerfile: services/gov-dept-ird/Dockerfile
    environment:
      DATABASE_URL: postgresql://ird:ird_dev_password@dept-ird:5432/ird
      TPT__GOV__DEPT_ID: ird
      TPT__GOV__HTTP_LISTEN: "0.0.0.0:8090"
      TPT__GOV__FEDERATION_LISTEN: "0.0.0.0:7001"
      RUST_LOG: "gov_dept_ird=info,tower_http=debug"
    ports:
      - "8090:8090"
    depends_on:
      dept-ird:
        condition: service_healthy

  gov-ingester-ird:
    build:
      context: ..
      dockerfile: services/gov-ingester-ird/Dockerfile
    environment:
      DATABASE_URL: postgresql://ird:ird_dev_password@dept-ird:5432/ird
      IRD_TRANSPORT: mock
      IRD_MOCK_FIXTURE: /fixtures/ird_batch.json
      IRD_RUN_ONCE: "true"
      RUST_LOG: "gov_ingester_ird=info,sqlx=warn"
    depends_on:
      dept-ird:
        condition: service_healthy

  # --- Gateway ---

  gov-dept-winz:
    build:
      context: ..
      dockerfile: services/gov-dept-winz/Dockerfile
    environment:
      DATABASE_URL: postgresql://winz:winz_dev_password@dept-winz:5432/winz
      TPT__GOV__DEPT_ID: winz
      TPT__GOV__HTTP_LISTEN: "0.0.0.0:8091"
      TPT__GOV__FEDERATION_LISTEN: "0.0.0.0:7002"
      RUST_LOG: "gov_dept_winz=info,tower_http=debug"
    ports:
      - "8091:8091"
    depends_on:
      dept-winz:
        condition: service_healthy

  gov-ingester-winz:
    build:
      context: ..
      dockerfile: services/gov-ingester-winz/Dockerfile
    environment:
      DATABASE_URL: postgresql://winz:winz_dev_password@dept-winz:5432/winz
      WINZ_TRANSPORT: mock
      WINZ_MOCK_FIXTURE: /fixtures/winz_batch.json
      WINZ_RUN_ONCE: "true"
      RUST_LOG: "gov_ingester_winz=info,sqlx=warn"
    depends_on:
      dept-winz:
        condition: service_healthy

  gov-dept-moh:
    build:
      context: ..
      dockerfile: services/gov-dept-moh/Dockerfile
    environment:
      DATABASE_URL: postgresql://moh:moh_dev_password@dept-moh:5432/moh
      TPT__GOV__DEPT_ID: moh
      TPT__GOV__HTTP_LISTEN: "0.0.0.0:8092"
      TPT__GOV__FEDERATION_LISTEN: "0.0.0.0:7003"
      RUST_LOG: "gov_dept_moh=info,tower_http=debug"
    ports:
      - "8092:8092"
    depends_on:
      dept-moh:
        condition: service_healthy

  gov-ingester-moh:
    build:
      context: ..
      dockerfile: services/gov-ingester-moh/Dockerfile
    environment:
      DATABASE_URL: postgresql://moh:moh_dev_password@dept-moh:5432/moh
      MOH_TRANSPORT: mock
      MOH_MOCK_FIXTURE: /fixtures/moh_batch.json
      MOH_RUN_ONCE: "true"
      RUST_LOG: "gov_ingester_moh=info,sqlx=warn"
    depends_on:
      dept-moh:
        condition: service_healthy

  gov-dept-dia:
    build:
      context: ..
      dockerfile: services/gov-dept-dia/Dockerfile
    environment:
      DATABASE_URL: postgresql://dia:dia_dev_password@dept-dia:5432/dia
      TPT__GOV__DEPT_ID: dia
      TPT__GOV__HTTP_LISTEN: "0.0.0.0:8093"
      TPT__GOV__FEDERATION_LISTEN: "0.0.0.0:7004"
      RUST_LOG: "gov_dept_dia=info,tower_http=debug"
    ports:
      - "8093:8093"
    depends_on:
      dept-dia:
        condition: service_healthy

  gov-ingester-dia:
    build:
      context: ..
      dockerfile: services/gov-ingester-dia/Dockerfile
    environment:
      DATABASE_URL: postgresql://dia:dia_dev_password@dept-dia:5432/dia
      DIA_TRANSPORT: mock
      DIA_MOCK_FIXTURE: /fixtures/dia_batch.json
      DIA_RUN_ONCE: "true"
      RUST_LOG: "gov_ingester_dia=info,sqlx=warn"
    depends_on:
      dept-dia:
        condition: service_healthy

  # --- NZTA (Waka Kotahi) ---

  gov-dept-nzta:
    build:
      context: ..
      dockerfile: services/gov-dept-nzta/Dockerfile
    environment:
      DATABASE_URL: postgresql://nzta:nzta_dev_password@dept-nzta:5432/nzta
      TPT__GOV__DEPT_ID: nzta
      TPT__GOV__HTTP_LISTEN: "0.0.0.0:8094"
      TPT__GOV__FEDERATION_LISTEN: "0.0.0.0:7005"
      RUST_LOG: "gov_dept_nzta=info,tower_http=debug"
    ports:
      - "8094:8094"
    depends_on:
      dept-nzta:
        condition: service_healthy

  gov-ingester-nzta:
    build:
      context: ..
      dockerfile: services/gov-ingester-nzta/Dockerfile
    environment:
      DATABASE_URL: postgresql://nzta:nzta_dev_password@dept-nzta:5432/nzta
      NZTA_TRANSPORT: mock
      NZTA_MOCK_FIXTURE: /fixtures/nzta_batch.json
      NZTA_RUN_ONCE: "true"
      RUST_LOG: "gov_ingester_nzta=info,sqlx=warn"
    depends_on:
      dept-nzta:
        condition: service_healthy

  gov-ingester-nzta:
    build:
      context: ..
      dockerfile: services/gov-ingester-nzta/Dockerfile
    environment:
      DATABASE_URL: postgresql://nzta:nzta_dev_password@dept-nzta:5432/nzta
      NZTA_TRANSPORT: mock
      NZTA_MOCK_FIXTURE: /fixtures/nzta_batch.json
      NZTA_RUN_ONCE: "true"
      RUST_LOG: "gov_ingester_nzta=info,sqlx=warn"
    depends_on:
      dept-nzta:
        condition: service_healthy

  # --- ACC (Accident Compensation Corporation) ---

  gov-dept-acc:
    build:
      context: ..
      dockerfile: services/gov-dept-acc/Dockerfile
    environment:
      DATABASE_URL: postgresql://acc:acc_dev_password@dept-acc:5432/acc
      TPT__GOV__DEPT_ID: acc
      TPT__GOV__HTTP_LISTEN: "0.0.0.0:8095"
      TPT__GOV__FEDERATION_LISTEN: "0.0.0.0:7006"
      RUST_LOG: "gov_dept_acc=info,tower_http=debug"
    ports:
      - "8095:8095"
    depends_on:
      dept-acc:
        condition: service_healthy

  gov-ingester-acc:
    build:
      context: ..
      dockerfile: services/gov-ingester-acc/Dockerfile
    environment:
      DATABASE_URL: postgresql://acc:acc_dev_password@dept-acc:5432/acc
      ACC_TRANSPORT: mock
      ACC_MOCK_FIXTURE: /fixtures/acc_batch.json
      ACC_RUN_ONCE: "true"
      RUST_LOG: "gov_ingester_acc=info,sqlx=warn"
    depends_on:
      dept-acc:
        condition: service_healthy

  gov-gateway:
    build:
      context: ..
      dockerfile: services/gov-gateway/Dockerfile
    environment:
      TPT__GOV__GATEWAY_LISTEN: "0.0.0.0:8080"
      TPT__GOV__DEPT_IRD_URL: "http://gov-dept-ird:8090"
      TPT__GOV__DEPT_WINZ_URL: "http://gov-dept-winz:8091"
      TPT__GOV__DEPT_MOH_URL: "http://gov-dept-moh:8092"
      TPT__GOV__DEPT_DIA_URL: "http://gov-dept-dia:8093"
      TPT__GOV__DEPT_NZTA_URL: "http://gov-dept-nzta:8094"
      TPT__GOV__DEPT_ACC_URL: "http://gov-dept-acc:8095"
      RUST_LOG: "gov_gateway=info,tower_http=debug"
    ports:
      - "8080:8080"
    depends_on:
      - gov-dept-ird

  # --- Identity Server ---

  gov-identity-server:
    build:
      context: ..
      dockerfile: services/gov-identity-server/Dockerfile
    environment:
      DATABASE_URL: postgresql://identity:identity_dev_password@identity-db:5432/gov_identity
      TPT__GOV__IDENTITY_LISTEN: "0.0.0.0:8081"
      RUST_LOG: "gov_identity_server=info"
    ports:
      - "8081:8081"
    depends_on:
      identity-db:
        condition: service_healthy

  dept-winz:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: winz
      POSTGRES_USER: winz
      POSTGRES_PASSWORD: winz_dev_password
    ports:
      - "5402:5432"
    volumes:
      - winz-data:/var/lib/postgresql/data
      - ./init/winz.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winz"]
      interval: 5s
      timeout: 5s
      retries: 10

  dept-moh:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: moh
      POSTGRES_USER: moh
      POSTGRES_PASSWORD: moh_dev_password
    ports:
      - "5403:5432"
    volumes:
      - moh-data:/var/lib/postgresql/data
      - ./init/moh.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moh"]
      interval: 5s
      timeout: 5s
      retries: 10

  dept-dia:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dia
      POSTGRES_USER: dia
      POSTGRES_PASSWORD: dia_dev_password
    ports:
      - "5404:5432"
    volumes:
      - dia-data:/var/lib/postgresql/data
      - ./init/dia.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dia"]
      interval: 5s
      timeout: 5s
      retries: 10

  dept-nzta:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: nzta
      POSTGRES_USER: nzta
      POSTGRES_PASSWORD: nzta_dev_password
    ports:
      - "5405:5432"
    volumes:
      - nzta-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nzta"]
      interval: 5s
      timeout: 5s
      retries: 10

  dept-acc:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: acc
      POSTGRES_USER: acc
      POSTGRES_PASSWORD: acc_dev_password
    ports:
      - "5406:5432"
    volumes:
      - acc-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acc"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Identity database ---

  identity-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gov_identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity_dev_password
    ports:
      - "5400:5432"
    volumes:
      - identity-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Audit log (append-only) ---

  audit-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gov_audit
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit_dev_password
    ports:
      - "5410:5432"
    volumes:
      - audit-data:/var/lib/postgresql/data

volumes:
  ird-data:
  winz-data:
  moh-data:
  dia-data:
  nzta-data:
  acc-data:
  identity-data:
  audit-data:
